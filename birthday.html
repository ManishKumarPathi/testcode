<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in;
        }
        
        .message {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .slideshow {
            position: relative;
            max-width: 100%;
            margin: 30px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .slide {
            display: none;
            width: 100%;
        }
        
        .slide.active {
            display: block;
            animation: slideIn 0.5s ease-in;
        }
        
        .slide img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .caption {
            background: rgba(102, 126, 234, 0.9);
            color: white;
            padding: 15px;
            font-size: 1.1em;
            margin-top: -5px;
            border-radius: 0 0 10px 10px;
        }
        
        .nav-buttons {
            margin-top: 20px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 0 10px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .dots {
            margin-top: 20px;
        }
        
        .dot {
            height: 12px;
            width: 12px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .dot.active {
            background-color: #667eea;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .heart {
            color: #e74c3c;
            font-size: 2em;
            margin: 20px 0;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            .container { padding: 20px; }
            .slide img { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Happy Birthday! 🎉</h1>
        <div class="heart">❤️</div>
        <p class="message">
            Wishing you the most amazing birthday! Here are some beautiful memories of the places we've visited together.
        </p>
        
        <div class="slideshow">
            <div class="slide active">
                <img src="photo1.jpg" alt="Memory 1">
                <div class="caption">Our first adventure together</div>
            </div>
            <div class="slide">
                <img src="photo2.jpg" alt="Memory 2">
                <div class="caption">That beautiful sunset</div>
            </div>
            <div class="slide">
                <img src="photo3.jpg" alt="Memory 3">
                <div class="caption">When we explored this amazing place</div>
            </div>
            <div class="slide">
                <img src="photo4.jpg" alt="Memory 4">
                <div class="caption">Unforgettable moments</div>
            </div>
        </div>
        
        <div class="nav-buttons">
            <button onclick="changeSlide(-1)">← Previous</button>
            <button onclick="changeSlide(1)">Next →</button>
        </div>
        
        <div class="dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
        
        <div class="heart">❤️</div>
        <p class="message">
            Love you! 💕
        </p>
    </div>
    
    <script>
        let currentIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        
        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            if (index >= slides.length) currentIndex = 0;
            if (index < 0) currentIndex = slides.length - 1;
            
            slides[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
        }
        
        function changeSlide(direction) {
            currentIndex += direction;
            showSlide(currentIndex);
        }
        
        function currentSlide(index) {
            currentIndex = index;
            showSlide(currentIndex);
        }
        
        // Auto-advance slides every 4 seconds
        setInterval(() => {
            currentIndex++;
            showSlide(currentIndex);
        }, 4000);
    </script>
</body>
</html>
